<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>宝ゲーム</title>
</head>
<body>
<h2>宝囲みゲーム</h2>
<div id="board"></div>

<script>
const size = 5;
const board = document.getElementById("board");
let selected = null;

let pieces = [
  {x:0,y:0,type:"→"},
  {x:4,y:0,type:"↓"},
  {x:0,y:4,type:"↘"},
  {x:4,y:4,type:"→"}
];

let treasure = {x:2,y:2};

function draw(){
  board.innerHTML="";
  board.style.display="grid";
  board.style.gridTemplateColumns="repeat(5,60px)";

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      const cell = document.createElement("div");
      cell.style.border="1px solid #000";
      cell.style.height="60px";

      let p = pieces.find(p=>p.x===x && p.y===y);
      if(p) cell.innerText = p.type;

      cell.onclick = ()=>clickCell(x,y);
      board.appendChild(cell);
    }
  }
}

function clickCell(x,y){
  let p = pieces.find(p=>p.x===x && p.y===y);

  if(p){
    selected = p;
    return;
  }

  if(selected){
    selected.x = x;
    selected.y = y;
    selected = null;
    draw();
  }
}

draw();
</script>
</body>
</html>
